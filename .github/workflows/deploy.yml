name: Daily Crypto Pipeline

on:
  schedule:
    # 8:00 AM UTC (3:00 AM EST / 9:00 AM CET)
    - cron: '0 8 * * *'
  workflow_dispatch: # This adds the manual "Run workflow" button

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # This installs from your requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Dummy
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Executes your heartbeat script
          python jobs/dummy.py