name: Daily Crypto Pipeline

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch: # Allows manual testing from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # We define env here so it's available to all steps in this job
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Dummy
        run: |
          python -m process.dummy

      - name: Send Email Snapshot
        run: |
          python -m process.email_dummy